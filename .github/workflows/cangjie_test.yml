name: cangjie test

jobs:

  test:
    runs-on: ubuntu-22.04
    steps:
      - name: download
        run: wget "https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-x64-1.1.3.tar.gz&objectKey=6a19349d21f5a8178d6fd22b" -q -O cangjie-sdk-linux-x64-1.1.3.tar.gz && tar -xzf cangjie-sdk-linux-x64-1.1.3.tar.gz
      - name: clone
        run：git clone https://github.com/HLBZQD/cangjiedemo.git
      - name: test
        run: source cangjie/envsetup.sh && cjc --version && cd cangjiedemo && cjpm update && cjpm build && cjpm test
  
